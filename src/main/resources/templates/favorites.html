<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Meus Favoritos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h1 class="mb-4">⭐ Meus Cursos Favoritos</h1>

<div sec:authorize="isAuthenticated()">
  <span>Bem-vindo, <strong sec:authentication="name"></strong>!</span>
  <form th:action="@{/logout}" method="post" style="display: inline;">
    <button type="submit" class="btn btn-danger btn-sm">Sair</button>
  </form>
</div>

<a href="/courses" class="btn btn-secondary mb-3">← Voltar para todos os cursos</a>

<table class="table table-striped">
  <thead>
  <tr>
    <th>ID</th>
    <th>Nome</th>
    <th>Duração (horas)</th>
    <th>Preço</th>
    <th>Lançamento</th>
    <th>Ação</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="fav : ${favorites}">
    <td th:text="${fav.course.id}">1</td>
    <td th:text="${fav.course.name}">Curso</td>
    <td th:text="${fav.course.duration}">40</td>
    <td th:text="'R$ ' + ${fav.course.price}">R$ 299,99</td>
    <td th:text="${#temporals.format(fav.course.releaseDate, 'dd/MM/yyyy')}">01/01/2025</td>
    <td>
    <td>
      <form th:action="@{/courses/favorite/{id}(id=${fav.course.id})}" method="post" style="display: inline;">
        <button type="submit" class="btn btn-danger btn-sm">Remover dos favoritos</button>
      </form>
    </td>
  </tr>
  <tr th:if="${favorites.isEmpty()}">
    <td colspan="6" class="text-center">Você ainda não tem cursos favoritos.</td>
  </tr>
  </tbody>
</table>

<a href="/courses" class="btn btn-secondary">Voltar</a>
</body>
</html>
