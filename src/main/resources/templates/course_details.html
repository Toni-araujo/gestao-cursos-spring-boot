<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Curso - IFPB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="container mt-5">

<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h1 class="text-primary"><i class="fas fa-book-open"></i> <span th:text="${course.name}"></span></h1>
        <p class="lead text-muted" th:text="${course.description}"></p>
        <hr>
        <div class="d-flex gap-3">
            <span class="badge bg-light text-dark border"><i class="far fa-clock"></i> <span th:text="${course.duration}"></span> horas</span>
            <span class="badge bg-success"><i class="fas fa-tag"></i> R$ <span th:text="${#numbers.formatDecimal(course.price, 1, 2)}"></span></span>
        </div>
    </div>
</div>

<h3 class="mb-3"><i class="fas fa-comments text-secondary"></i> Comentários</h3>

<div sec:authorize="isAuthenticated()" class="mb-4">
    <form th:action="@{/courses/{id}/comment(id=${course.id})}" method="post">
        <div class="form-floating mb-3">
            <textarea class="form-control" name="content" id="commentBox" style="height: 100px" placeholder="Deixe seu comentário" required></textarea>
            <label for="commentBox">O que você achou deste curso?</label>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Publicar</button>
    </form>
</div>

<div sec:authorize="isAnonymous()" class="alert alert-warning">
    <i class="fas fa-lock"></i> Você precisa fazer <a href="/login" class="alert-link">login</a> para avaliar ou comentar neste curso.
</div>

<div class="mt-4 mb-5">
    <div th:each="comment : ${comments}" class="card mb-3 shadow-sm border-0 bg-light">
        <div class="card-body py-2">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <strong class="text-primary"><i class="fas fa-user-circle"></i> <span th:text="${comment.user.name}"></span></strong>
                <small class="text-muted" th:text="${#temporals.format(comment.createdAt, 'dd/MM/yyyy HH:mm')}"></small>
            </div>
            <p class="card-text mb-1" th:text="${comment.content}"></p>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(comments)}" class="text-center text-muted p-4">
        <i class="fas fa-comment-slash fa-2x mb-2"></i>
        <p>Nenhum comentário ainda. Seja o primeiro a opinar!</p>
    </div>
</div>

<a href="/courses" class="btn btn-outline-secondary mb-5"><i class="fas fa-arrow-left"></i> Voltar à Lista</a>

</body>
</html>
