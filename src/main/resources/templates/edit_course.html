<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Curso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h1 class="mb-4">✏️ Editar Curso</h1>

<form th:action="@{/courses/edit/{id}(id=${course.id})}" th:object="${course}" method="post">
    <div class="mb-3">
        <label class="form-label">Nome do Curso:</label>
        <input type="text" th:field="*{name}" class="form-control"
               th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
        <div class="invalid-feedback" th:errors="*{name}">Erro</div>
    </div>

    <div class="mb-3">
        <label class="form-label">Duração (horas):</label>
        <input type="number" th:field="*{duration}" class="form-control"
               th:classappend="${#fields.hasErrors('duration')} ? 'is-invalid' : ''">
        <div class="invalid-feedback" th:errors="*{duration}">Erro</div>
    </div>

    <div class="mb-3">
        <label class="form-label">Preço (R$):</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control"
               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
        <div class="invalid-feedback" th:errors="*{price}">Erro</div>
    </div>

    <div class="mb-3">
        <label class="form-label">Data de Lançamento:</label>
        <input type="date" th:field="*{releaseDate}" class="form-control"
               th:classappend="${#fields.hasErrors('releaseDate')} ? 'is-invalid' : ''">
        <div class="invalid-feedback" th:errors="*{releaseDate}">Erro</div>
        <small class="form-text text-muted">Use o formato AAAA-MM-DD (data futura ou hoje)</small>
    </div>

    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/courses" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
